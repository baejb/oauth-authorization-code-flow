spring:
  application:
    name: oauth

  # 학습용 인메모리 DB. 애플리케이션 종료 시 초기화된다.
  datasource:
    url: jdbc:h2:mem:oauth;DB_CLOSE_DELAY=-1;MODE=LEGACY
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  h2:
    console:
      enabled: true   # http://localhost:8080/h2-console (개발용)

  security:
    oauth2:
      client:
        registration:
          google:
            # 실제 값은 환경변수(GOOGLE_CLIENT_ID/SECRET)로 주입한다. 커밋 금지.
            client-id: ${GOOGLE_CLIENT_ID:changeit-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:changeit-google-client-secret}
            scope:
              - openid
              - profile
              - email
          kakao:
            client-id: ${KAKAO_CLIENT_ID:changeit-kakao-client-id}
            client-secret: ${KAKAO_CLIENT_SECRET:changeit-kakao-client-secret}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - account_email
            client-name: Kakao
        # 카카오는 Spring Security 내장 제공자가 아니므로 엔드포인트를 직접 지정한다.
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

# 우리 서비스 고유 설정
app:
  jwt:
    # 최소 32바이트. 운영에서는 반드시 JWT_SECRET 환경변수로 교체할 것.
    secret: ${JWT_SECRET:local-dev-only-secret-please-change-me-0123456789}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}   # 1시간
  oauth2:
    # 로그인 완료 후 토큰을 전달하며 리다이렉트할 프론트 주소
    authorized-redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:8080/loginSuccess.html}

logging:
  level:
    org.springframework.security: INFO
